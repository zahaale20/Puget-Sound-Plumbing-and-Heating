name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migrate-database:
    name: Migrate Database (Alembic)
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL || secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required database secret
        run: |
          [ -n "$DATABASE_URL" ] || (echo "Missing secret: PRODUCTION_DATABASE_URL (or DATABASE_URL)" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install backend migration dependencies
        working-directory: server
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Apply production migrations before deploy
        working-directory: server
        run: alembic upgrade head

      - name: Verify production schema is at Alembic head
        working-directory: server
        run: |
          python - <<'PY'
          import os

          from alembic.config import Config
          from alembic.runtime.migration import MigrationContext
          from alembic.script import ScriptDirectory
          from sqlalchemy import create_engine

          dsn = os.environ["DATABASE_URL"]
          if dsn.startswith("postgresql://") and "+" not in dsn.split("://", 1)[0]:
              dsn = dsn.replace("postgresql://", "postgresql+psycopg://", 1)

          config = Config("alembic.ini")
          expected_heads = set(ScriptDirectory.from_config(config).get_heads())
          engine = create_engine(dsn)
          with engine.connect() as connection:
              current_heads = set(MigrationContext.configure(connection).get_current_heads())

          if current_heads != expected_heads:
              raise SystemExit(
                  "Production schema is not at Alembic head: "
                  f"current={sorted(current_heads)} expected={sorted(expected_heads)}"
              )

          print(f"Production schema verified at Alembic head(s): {sorted(current_heads)}")
          PY

  deploy-client:
    name: Deploy Client (Vercel)
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    needs: migrate-database
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CLIENT_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required Vercel secrets (client)
        run: |
          [ -n "$VERCEL_TOKEN" ] || (echo "Missing secret: VERCEL_TOKEN" && exit 1)
          [ -n "$VERCEL_ORG_ID" ] || (echo "Missing secret: VERCEL_ORG_ID" && exit 1)
          [ -n "$VERCEL_PROJECT_ID" ] || (echo "Missing secret: VERCEL_CLIENT_PROJECT_ID" && exit 1)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd client

      - name: Build client deploy artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN" --cwd client

      - name: Deploy client to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --cwd client

  deploy-server:
    name: Deploy Server (Vercel)
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    needs: migrate-database
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVER_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required Vercel secrets (server)
        run: |
          [ -n "$VERCEL_TOKEN" ] || (echo "Missing secret: VERCEL_TOKEN" && exit 1)
          [ -n "$VERCEL_ORG_ID" ] || (echo "Missing secret: VERCEL_ORG_ID" && exit 1)
          [ -n "$VERCEL_PROJECT_ID" ] || (echo "Missing secret: VERCEL_SERVER_PROJECT_ID" && exit 1)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd server

      - name: Build server deploy artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN" --cwd server

      - name: Deploy server to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --cwd server
