[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --strict-markers --disable-warnings --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=85 --ignore=venv
asyncio_mode = auto
markers =
    asyncio: mark a test as requiring an asyncio event loop
    integration: tests that require the docker-compose Postgres (skipped if unreachable)
